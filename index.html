<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Your Name</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        header p {
            color: #aaa;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 40px;
        }

        .gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            transition: 0.3s ease;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.05);
            opacity: 0.8;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #777;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Huynh Thanh Phat</h1>
    <p>Graphic Designer | 3D Artist</p>
</header>

<section class="gallery">
    <img src="https://picsum.photos/500/700?random=1" alt="">
    <img src="https://picsum.photos/500/700?random=2" alt="">
    <img src="https://picsum.photos/500/700?random=3" alt="">
    <img src="https://picsum.photos/500/700?random=4" alt="">
    <img src="https://picsum.photos/500/700?random=5" alt="">
    <img src="https://picsum.photos/500/700?random=6" alt="">
</section>

<footer>
    © 2026 Huynh Thanh Phat. All rights reserved.
</footer>

</body>

</html>
