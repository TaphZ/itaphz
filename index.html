<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    font-family:'Poppins', sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    z-index:2;
}

.title{
    font-family:'Pacifico', cursive;
    font-size:60px;

    background:linear-gradient(45deg,#ff4d6d,#ff9a9e,#ff6ec7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:fadeIn 2s ease;
}

.message{
    font-size:24px;
    margin-top:15px;
    color:white;
    text-shadow:0 0 10px rgba(255,255,255,0.7);
    animation:fadeIn 3s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:22px;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-10vh);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">
    <div class="title">Nhân ngày Quốc Tế Phụ Nữ 8/3 🌸</div>
    <div class="message">
        Chúc bạn luôn vui vẻ, xinh đẹp và hạnh phúc mỗi ngày ❤️
    </div>
</div>

<script>

function createHeart(){

    const heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*3+3)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
